<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Patient Medical History</title>
    <style>
       body {
    font-family: Arial, sans-serif;
    background-image: url("images/indexbg.png"); 
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    background-attachment: fixed;
    margin: 0;
    padding: 20px;
}

        .container {
    max-width: 700px;
    background: rgba(255, 255, 255, 0.9);
    padding: 20px;
    border-radius: 8px;
    box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    margin: auto;
}

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        label {
            font-weight: bold;
            display: block;
            margin-top: 15px;
        }

        textarea, input, select {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            margin-top: 20px;
            padding: 10px;
            width: 100%;
            border: none;
            background-color: #007bff;
            color: white;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #0056b3;
        }

        .history-display {
            margin-top: 30px;
            padding: 15px;
            background: #f9fafc;
            border-radius: 5px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Patient Medical History</h2>

    <form>
        <label>Patient ID</label>
        <input type="text" >
        <label>Doctor Name</label>
        <textarea rows="1" ></textarea>
        <label>Date</label>
        <textarea rows="1" ></textarea>

        <label>Previous Diseases</label>
        <textarea rows="3" ></textarea>

        <label>Surgeries(if any)</label>
        <textarea rows="3"></textarea>

        <label>Current Medications</label>
        <textarea rows="3" ></textarea>

        <label>Allergies</label>
        <textarea rows="2"></textarea>
        <label>status(completed/Not completed)</label>
        <textarea rows="1" ></textarea>
        
        <label>Additional Notes</label>
        <textarea rows="3"></textarea>
        
        
        <button type="submit">Save Medical History</button>
       
    </form>

    
</div>

</body>
</html>
