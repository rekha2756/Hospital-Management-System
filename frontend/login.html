<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HealthAxis HMS</title>

<!-- Google Identity Services -->
<script src="https://accounts.google.com/gsi/client" async defer></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial, sans-serif;}

body{
background:url("images/bg3.png") no-repeat center center fixed;
background-size:cover;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.register-card{
background:rgba(255,255,255,0.95);
max-width:420px;
width:100%;
max-height:90vh;
padding:30px;
border-radius:25px;
box-shadow:0 20px 40px rgba(0,0,0,0.2);
position:relative;
z-index:2;
overflow-y:auto;
}

/* స్క్రోల్బార్ స్టైల్ */
.register-card::-webkit-scrollbar {
width: 6px;
}

.register-card::-webkit-scrollbar-track {
background: #eaf5f9;
border-radius: 10px;
}

.register-card::-webkit-scrollbar-thumb {
background: #1b6d84;
border-radius: 10px;
}

.health-quote{text-align:center;font-size:20px;font-weight:bold;color:#0b5e7a;margin-bottom:5px;}
.health-quote span{display:block;font-size:13px;color:#4a7d90;margin-top:5px;}

h2{text-align:center;color:#083d52;margin:10px 0;}
.sub{text-align:center;color:#4d7a8c;margin-bottom:20px;font-size:14px;}

.reg-form{display:flex;flex-direction:column;gap:15px;}

label{font-size:14px;color:#0e5066;margin-left:10px;}

input{
width:100%;
padding:10px 15px;
border-radius:30px;
border:1.5px solid #cce3ec;
outline:none;
}

input:focus{border-color:#1b6d84;}

.radio-group{
display:flex;
gap:20px;
background:#eaf5f9;
padding:8px 15px;
border-radius:30px;
}

.radio-group label{
display:flex;
align-items:center;
gap:5px;
font-size:14px;
}

.contact-hint{font-size:12px;color:#3d7c93;margin-left:15px;}

.action-btn{
background:#1b6d84;
color:white;
padding:12px;
border:none;
border-radius:30px;
cursor:pointer;
font-weight:bold;
margin-top:10px;
}

.action-btn:hover{background:#0f6079;}

.divider{text-align:center;margin:20px 0;color:#5f8fa3;font-size:14px;}

/* Google Button */
.google-btn{
display:flex;
justify-content:center;
align-items:center;
gap:6px;
width:100%;
background:white;
border:1.5px solid #cde3ed;
padding:10px;
border-radius:30px;
cursor:pointer;
font-weight:600;
color:#144f64;
font-size:14px;
transition:0.2s ease;
}

.google-btn img{
width:20px;
height:20px;
object-fit:contain;
}

.google-btn:hover{
background:#f1f7fa;
border-color:#1b6d84;
}

.login-redirect{text-align:center;margin-top:20px;font-size:14px;}
.login-redirect a{color:#117a9e;text-decoration:none;font-weight:bold;}

.verify-message{
background:#e1f1f8;
padding:8px 12px;
border-radius:20px;
font-size:13px;
color:#004d66;
margin-top:10px;
display:none;
}

/* Google One Tap */
#google-one-tap-container {
position:fixed;
top:20px;
right:20px;
z-index:1000;
}

/* 🎉 Confetti Animation */
.confetti{
position:fixed;
width:10px;
height:10px;
top:-10px;
animation:fall 3s linear forwards;
z-index:1;
}

@keyframes fall{
to{
transform:translateY(100vh) rotate(360deg);
opacity:0;
}
}

/* మొబైల్ పరికరాల కోసం */
@media (max-width: 480px) {
.register-card {
padding: 20px;
max-height: 85vh;
}
}
</style>
</head>

<body>

<!-- Google One Tap Container -->
<div id="google-one-tap-container"></div>

<div class="register-card">

<div class="health-quote">
Your Health, Our Priority
<span id="modeText">registration · secure access</span>
</div>

<h2>HealthAxis HMS</h2>
<div class="sub" id="formTitle">create your account</div>

<form class="reg-form" id="registrationForm">

<!-- Full Name Field - Only for Registration -->
<div id="fullNameField">
<label>👤 Full Name</label>
<input type="text" id="fullName" placeholder="Enter your full name">
</div>

<!-- Contact Selection - Always Visible -->
<div class="radio-group" id="radioGroup">
<label><input type="radio" name="contactType" value="email" checked> Email</label>
<label><input type="radio" name="contactType" value="mobile"> Mobile</label>
</div>

<!-- Dynamic Contact Input - Always Visible -->
<label id="contactLabel">📧 Email address</label>
<input type="email" id="contactInput" placeholder="Enter your email" required>

<div class="contact-hint" id="hintText">
Verification code will be sent to your email
</div>

<!-- Password Field - Always Visible -->
<label>🔐 Password</label>
<input type="password" id="password" placeholder="Enter password (min 8 chars)" minlength="8" required>

<!-- Confirm Password Field - Only for Registration -->
<div id="confirmPasswordField">
<label>🔐 Confirm Password</label>
<input type="password" id="confirmPassword" placeholder="Re-enter your password">
</div>

<div class="verify-message" id="verifyMessage"></div>

<button type="button" class="action-btn" id="mainActionBtn">
Register & Get Verification
</button>

<div id="otpSection" style="display:none;">
<input type="text" id="otpInput" placeholder="Enter OTP" style="margin-top:10px;">
<button type="button" class="action-btn" style="margin-top:10px;" onclick="verifyOTP()">Verify OTP</button>
</div>

</form>

<div class="divider">OR</div>

<!-- Google Sign-In Button -->
<div id="g_id_onload"
     data-client_id="YOUR_GOOGLE_CLIENT_ID.apps.googleusercontent.com"
     data-context="signin"
     data-ux_mode="popup"
     data-callback="handleCredentialResponse"
     data-auto_prompt="false">
</div>

<div class="g_id_signin"
     data-type="standard"
     data-shape="rectangular"
     data-theme="outline"
     data-text="continue_with"
     data-size="large"
     data-logo_alignment="left"
     data-width="300">
</div>

<div class="login-redirect">
<span id="toggleText">Already registered?</span> 
<a href="#" id="toggleLink">Login</a>
</div>

</div>

<script>
let generatedOTP = "";
let isLoginMode = false;

window.onload = function() {
    // Initialize Google One Tap
    google.accounts.id.initialize({
        client_id: 'YOUR_GOOGLE_CLIENT_ID.apps.googleusercontent.com',
        callback: handleCredentialResponse,
        auto_select: false,
        cancel_on_tap_outside: true
    });

    // Add event listeners for radio buttons
    const emailRadio = document.querySelector('input[value="email"]');
    const mobileRadio = document.querySelector('input[value="mobile"]');
    const contactInput = document.getElementById('contactInput');
    const contactLabel = document.getElementById('contactLabel');
    const hintText = document.getElementById('hintText');

    emailRadio.addEventListener('change', function() {
        if(this.checked) {
            contactLabel.innerHTML = '📧 Email address';
            contactInput.type = 'email';
            contactInput.placeholder = 'Enter your email';
            hintText.innerText = 'Verification code will be sent to your email';
        }
    });

    mobileRadio.addEventListener('change', function() {
        if(this.checked) {
            contactLabel.innerHTML = '📱 Mobile number';
            contactInput.type = 'tel';
            contactInput.placeholder = 'Enter 10-digit mobile number';
            hintText.innerText = 'Verification code will be sent via SMS';
        }
    });

    // Show One Tap if user was previously signed in
    setTimeout(() => {
        google.accounts.id.prompt((notification) => {
            if (notification.isNotDisplayed()) {
                console.log('One Tap not displayed');
            }
            if (notification.isSkippedMoment()) {
                console.log('One Tap skipped');
            }
            if (notification.isDismissedMoment()) {
                console.log('One Tap dismissed');
            }
        });
    }, 1000);
};

// Handle Google credential response
function handleCredentialResponse(response) {
    // Decode the JWT token
    const responsePayload = parseJwt(response.credential);
    
    console.log("Google User:", responsePayload);
    
    // Show success message with user info
    showConfetti();
    alert(`Welcome ${responsePayload.name}!\nSigned in with ${responsePayload.email}`);
    
    // Auto-fill the form with Google user data (optional)
    document.getElementById('fullName').value = responsePayload.name || '';
    document.getElementById('contactInput').value = responsePayload.email || '';
    
    // You can send this token to your backend for verification
    // verifyGoogleToken(response.credential);
}

// Helper function to parse JWT token
function parseJwt(token) {
    var base64Url = token.split('.')[1];
    var base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
    var jsonPayload = decodeURIComponent(atob(base64).split('').map(function(c) {
        return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
    }).join(''));
    return JSON.parse(jsonPayload);
}

// Optional: Send token to backend
function verifyGoogleToken(credential) {
    fetch('/api/auth/google', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
        },
        body: JSON.stringify({ token: credential })
    })
    .then(response => response.json())
    .then(data => {
        console.log('Backend response:', data);
    })
    .catch(error => {
        console.error('Error:', error);
    });
}

/* 🎉 Confetti Function */
function showConfetti(){
    for(let i=0;i<80;i++){
        let conf=document.createElement("div");
        conf.classList.add("confetti");
        conf.style.left=Math.random()*100+"vw";
        conf.style.backgroundColor=`hsl(${Math.random()*360},70%,60%)`;
        conf.style.animationDuration=(2+Math.random()*2)+"s";
        document.body.appendChild(conf);
        setTimeout(()=>conf.remove(),4000);
    }
}

const toggleLink=document.getElementById("toggleLink");
const mainActionBtn=document.getElementById("mainActionBtn");
const formTitle=document.getElementById("formTitle");
const modeText=document.getElementById("modeText");
const verifyMessage=document.getElementById("verifyMessage");
const otpSection=document.getElementById("otpSection");
const fullNameField = document.getElementById('fullNameField');
const confirmPasswordField = document.getElementById('confirmPasswordField');

function updateFormForMode(loginMode) {
    if(loginMode) {
        formTitle.innerText = "login to your account";
        modeText.innerText = "secure login access";
        mainActionBtn.innerText = "Login";
        fullNameField.style.display = "none";
        confirmPasswordField.style.display = "none";
        toggleLink.innerText = "Register";
        document.getElementById("toggleText").innerText = "New user?";
    } else {
        formTitle.innerText = "create your account";
        modeText.innerText = "registration · secure access";
        mainActionBtn.innerText = "Register & Get Verification";
        fullNameField.style.display = "block";
        confirmPasswordField.style.display = "block";
        toggleLink.innerText = "Login";
        document.getElementById("toggleText").innerText = "Already registered?";
    }
}

toggleLink.addEventListener("click",function(e){
    e.preventDefault();
    isLoginMode = !isLoginMode;

    verifyMessage.style.display="none";
    otpSection.style.display="none";

    updateFormForMode(isLoginMode);
});

mainActionBtn.addEventListener("click",function(){
    let fullName = document.getElementById("fullName").value.trim();
    let contactValue=document.getElementById("contactInput").value.trim();
    let password=document.getElementById("password").value.trim();
    let confirmPassword = document.getElementById("confirmPassword").value.trim();
    let contactType = document.querySelector('input[name="contactType"]:checked').value;

    if(isLoginMode){
        // Login validation
        if(contactValue === ""){
            if(contactType === "email"){
                alert("Please enter your email address");
            } else {
                alert("Please enter your mobile number");
            }
            return;
        }

        if(contactType === "mobile" && !/^\d{10}$/.test(contactValue)){
            alert("Please enter a valid 10-digit mobile number");
            return;
        }

        if(contactType === "email" && !contactValue.includes('@')){
            alert("Please enter a valid email address");
            return;
        }

        if(password.length < 8){
            alert("Password must be at least 8 characters");
            return;
        }

        showConfetti();
        alert("Login Successful!");
    } else {
        // Registration validation
        if(fullName === ""){
            alert("Please enter your full name");
            return;
        }

        if(contactValue === ""){
            if(contactType === "email"){
                alert("Please enter your email address");
            } else {
                alert("Please enter your mobile number");
            }
            return;
        }

        if(contactType === "mobile" && !/^\d{10}$/.test(contactValue)){
            alert("Please enter a valid 10-digit mobile number");
            return;
        }

        if(contactType === "email" && !contactValue.includes('@')){
            alert("Please enter a valid email address");
            return;
        }

        if(password.length < 8){
            alert("Password must be at least 8 characters");
            return;
        }

        if(password !== confirmPassword){
            alert("Passwords do not match!");
            return;
        }

        generatedOTP = Math.floor(100000 + Math.random()*900000).toString();
        verifyMessage.style.display="block";
        verifyMessage.innerText="Verification code sent successfully.";
        otpSection.style.display="block";
    }
});

function verifyOTP(){
    let entered=document.getElementById("otpInput").value.trim();
    if(entered===generatedOTP){
        showConfetti();
        alert("Registration Successful!\nWelcome " + document.getElementById("fullName").value.trim());
        location.reload();
    }else{
        alert("Invalid OTP");
    }
}
</script>

<!-- Important: Replace YOUR_GOOGLE_CLIENT_ID with your actual Google Client ID -->
<!-- Get it from: https://console.cloud.google.com/apis/credentials -->

</body>
</html>
