<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin | Billing</title>
  <link rel="stylesheet" href="../css/admin/bills.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<div class="admin-container">
  <header class="admin-header">
    <h1>Billing Section</h1>
  </header>

  <!-- Search & Filters -->
  <div class="search-filter">
    <input type="text" id="searchInput" placeholder="Search by Patient, Bill ID, Service...">
    <select id="statusFilter">
      <option value="">All Statuses</option>
      <option value="Paid">Paid</option>
      <option value="Pending">Pending</option>
      <option value="Overdue">Overdue</option>
    </select>
    <input type="date" id="dateFilter">
  </div>

  <!-- Billing Table -->
  <div class="table-container">
    <table>
      <thead>
        <tr>
          <th>Bill ID</th>
          <th>Patient Name / ID</th>
          <th>Service</th>
          <th>Amount</th>
          <th>Status</th>
          <th>Date</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="billingTable">
        <tr>
          <td>B-1001</td>
          <td>John Doe / P-001</td>
          <td>Consultation</td>
          <td>$50</td>
          <td><span class="badge paid">Paid</span></td>
          <td>2026-03-04</td>
          <td class="actions">
            <button class="view-btn"><i class="fas fa-eye"></i></button>
            <button class="download-btn"><i class="fas fa-file-pdf"></i></button>
            <button class="send-btn"><i class="fas fa-paper-plane"></i></button>
          </td>
        </tr>
        <tr>
          <td>B-1002</td>
          <td>Mary Jane / P-002</td>
          <td>Lab Test</td>
          <td>$120</td>
          <td><span class="badge pending">Pending</span></td>
          <td>2026-03-03</td>
          <td class="actions">
            <button class="view-btn"><i class="fas fa-eye"></i></button>
            <button class="download-btn"><i class="fas fa-file-pdf"></i></button>
            <button class="send-btn"><i class="fas fa-paper-plane"></i></button>
          </td>
        </tr>
        <tr>
          <td>B-1003</td>
          <td>Robert Smith / P-003</td>
          <td>Surgery</td>
          <td>$500</td>
          <td><span class="badge overdue">Overdue</span></td>
          <td>2026-02-28</td>
          <td class="actions">
            <button class="view-btn"><i class="fas fa-eye"></i></button>
            <button class="download-btn"><i class="fas fa-file-pdf"></i></button>
            <button class="send-btn"><i class="fas fa-paper-plane"></i></button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

<script>
  // Simple frontend search filter
  const searchInput = document.getElementById('searchInput');
  const billingTable = document.getElementById('billingTable');

  searchInput.addEventListener('keyup', function() {
    const filter = searchInput.value.toLowerCase();
    Array.from(billingTable.rows).forEach(row => {
      const text = row.innerText.toLowerCase();
      row.style.display = text.includes(filter) ? '' : 'none';
    });
  });
</script>

</body>
</html>
