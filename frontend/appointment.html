<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book an Appointment</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f7f7f7;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: auto;
            background-color: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h2 {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #333;
        }
        h2::before {
            content: "🏥";
        }
        form {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }
        .form-section {
            flex: 1;
            min-width: 300px;
        }
        label {
            display: block;
            margin-top: 10px;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input, select, textarea {
            width: 100%;
            padding: 8px;
            border-radius: 4px;
            border: 1px solid #ccc;
        }
        textarea {
            resize: vertical;
            min-height: 60px;
        }
        .buttons {
            margin-top: 20px;
            text-align: center;
            width: 100%;
        }
        button {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin: 0 10px;
            font-size: 16px;
        }
        .book-btn {
            background-color: #007BFF;
            color: #fff;
        }
        .cancel-btn {
            background-color: #ccc;
        }
        /* Fix for Gender radio buttons */
        .gender-options {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-top: 5px;
        }
        .gender-options input {
            margin: 0;
            vertical-align: middle;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Book an Appointment</h2>
        <p>Please fill in the details below to book your appointment.</p>
        <form>
            <!-- Patient Information -->
            <div class="form-section">
                <h3>Patient Information</h3>
                <label for="fullname">Full Name:</label>
                <input type="text" id="fullname" name="fullname" required>

                <label for="dob">Date of Birth:</label>
                <input type="date" id="dob" name="dob" required>

                <label>Gender:</label>
                <div class="gender-options">
                    <label><input type="radio" name="gender" value="Male" checked> Male</label>
                    <label><input type="radio" name="gender" value="Female"> Female</label>
                    <label><input type="radio" name="gender" value="Other"> Other</label>
                </div>

                <label for="contact">Contact Number:</label>
                <input type="tel" id="contact" name="contact" required>

                <label for="email">Email Address:</label>
                <input type="email" id="email" name="email">
            </div>

            <!-- Appointment Details -->
            <div class="form-section">
                <h3>Appointment Details</h3>
                <label for="hospital">Select Hospital:</label>
                <select id="hospital" name="hospital" required>
                    <option value="">Choose Hospital</option>
                    <option value="hospital1">Hospital 1</option>
                    <option value="hospital2">Hospital 2</option>
                    <option value="hospital3">Hospital 3</option>
                </select>

                <label for="department">Department:</label>
                <select id="department" name="department" required>
                    <option value="">Select Department</option>
                    <option value="cardiology">Cardiology</option>
                    <option value="orthopedics">Orthopedics</option>
                    <option value="general">General</option>
                </select>

                <label for="doctor">Select Doctor:</label>
                <select id="doctor" name="doctor" required>
                    <option value="">Choose Doctor</option>
                    <option value="doc1">Dr. A</option>
                    <option value="doc2">Dr. B</option>
                </select>

                <label for="date">Appointment Date:</label>
                <input type="date" id="date" name="date" required>

                <label for="time">Appointment Time:</label>
                <select id="time" name="time" required>
                    <option value="">Select Time Slot</option>
                    <option value="10:00">10:00 AM</option>
                    <option value="11:00">11:00 AM</option>
                    <option value="12:00">12:00 PM</option>
                </select>

                <label for="type">Appointment Type:</label>
                <select id="type" name="type" required>
                    <option value="consultation">Consultation</option>
                    <option value="followup">Follow-up</option>
                    <option value="emergency">Emergency</option>
                </select>

                <label for="mode">Mode of Consultation:</label>
                <select id="mode" name="mode" required>
                    <option value="inperson">In-Person</option>
                    <option value="online">Online</option>
                </select>

                <label for="reason">Reason for Visit:</label>
                <textarea id="reason" name="reason"></textarea>

                <label for="insurance">Insurance Details (Optional):</label>
                <input type="text" id="insurance" name="insurance">
            </div>

            <div class="buttons">
                <button type="submit" class="book-btn">Book Appointment</button>
                <button type="reset" class="cancel-btn">Cancel</button>
            </div>
        </form>
    </div>
</body>
</html>
