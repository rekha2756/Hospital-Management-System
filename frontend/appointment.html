<!DOCTYPE html>
<html>
<head>
    <title>Book Appointment</title>
    <link rel="stylesheet" href="css/appointment.css">
</head>

<body>

<div class="overlay">

<div class="appointment-container">

    <!-- FORM SECTION -->
    <div class="appointment-form-section">

        <h1>Book Appointment</h1>
        <p class="subtitle">Enter Details</p>

        <form>

            <div class="form-group">
                <label>Full Name</label>
                <input type="text" placeholder="Enter your full name" required>
            </div>

            <div class="form-group">
                <label>Contact Number</label>
                <input type="tel" placeholder="Phone number" required>
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" placeholder="Email address">
            </div>

            <div class="form-group">
                <label>Hospital</label>
                <select required>
                    <option value="">Select Hospital</option>
                    <option>Government General Hospital</option>
                    <option>Apollo Hospital</option>
                    <option>City Care Hospital</option>
                </select>
            </div>

            <div class="form-group">
                <label>Specialist</label>
                <select required>
                    <option value="">Select Specialist</option>
                    <option>Cardiologist</option>
                    <option>Dermatologist</option>
                    <option>Orthopedic</option>
                </select>
            </div>

            <div class="form-group">
                <label>Appointment Date</label>
                <input type="date" required>
            </div>

            <div class="form-group">
                <label>Time Slot</label>
                <select required>
                    <option value="">Select Time</option>
                    <option>09:00 AM - 10:00 AM</option>
                    <option>10:00 AM - 11:00 AM</option>
                    <option>02:00 PM - 03:00 PM</option>
                </select>
            </div>

            <div class="form-group">
                <label>Reason</label>
                <textarea placeholder="Describe your issue"></textarea>
            </div>

            <button type="button" class="book-btn" onclick="showPopup()">
                Confirm Appointment
            </button>

        </form>
        <!-- ADD THIS HERE -->
        <div id="successPopup" class="popup">
            <div class="popup-content">
                <h2>✅ Appointment Booked!</h2>
                <p>Your appointment has been successfully scheduled.</p>
                <button onclick="closePopup()">OK</button>
                </div>
            </div>

            <script>
            function showPopup() {

                let name = document.querySelector("input[type='text']").value;
                let phone = document.querySelector("input[type='tel']").value;
                let date = document.querySelector("input[type='date']").value;

                let message = "Hello " + name + 
                                ", your appointment is booked for " + date + 
                                ". Thank you!";

                let whatsappURL = "https://wa.me/91" + phone + 
                                  "?text=" + encodeURIComponent(message);

                window.open(whatsappURL, "_blank");

                document.getElementById("successPopup").style.display = "flex";
            }

            function closePopup() {
                document.getElementById("successPopup").style.display = "none";
            }
</script>
    </div>

    <!-- IMAGE SECTION -->
    <div class="appointment-image-section">
        <img src="images/appoint.png">
    </div>

</div>

</div>

</body>
</html>
