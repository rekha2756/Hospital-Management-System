<!DOCTYPE html>
<html>
<head>
    <title>Book Appointment</title>
    <link rel="stylesheet" href="css/appointment.css">
    <style>
        .popup { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); justify-content:center; align-items:center; }
        .popup-content { background:white; padding:20px; border-radius:8px; text-align:center; }
    </style>
</head>
<body>
<div class="overlay">
<div class="appointment-container">

    <div class="appointment-form-section">
        <h1>Book Appointment</h1>
        <p class="subtitle">Enter Details</p>

        <form id="appointmentForm">
            <div class="form-group">
                <label>Full Name *</label>
                <input type="text" id="patient_name" placeholder="Enter your full name" required>
            </div>
            <div class="form-group">
                <label>Phone Number *</label>
                <input type="tel" id="patient_phone" placeholder="Enter your phone number" required>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="patient_email" placeholder="Enter your email (optional)">
            </div>
            <div class="form-group">
                <label>Hospital *</label>
                <select id="hospital" required>
                    <option value="">Select Hospital</option>
                </select>
            </div>
            <div class="form-group">
                <label>Specialist *</label>
                <select id="doctor" required>
                    <option value="">Select Specialist</option>
                </select>
            </div>
            <div class="form-group">
                <label>Appointment Date *</label>
                <input type="date" id="appointment_date" required>
            </div>
            <div class="form-group">
                <label>Time Slot *</label>
                <select id="time_slot" required>
                    <option value="">Select Time</option>
                    <option>09:00 AM - 10:00 AM</option>
                    <option>10:00 AM - 11:00 AM</option>
                    <option>02:00 PM - 03:00 PM</option>
                </select>
            </div>
            <div class="form-group">
                <label>Reason</label>
                <textarea id="reason" placeholder="Describe your issue"></textarea>
            </div>
            <button type="submit" class="book-btn">Confirm Appointment</button>
        </form>

        <div id="successPopup" class="popup">
            <div class="popup-content">
                <h2>✅ Appointment Booked!</h2>
                <p>Your appointment has been successfully scheduled.</p>
                <button onclick="closePopup()">OK</button>
            </div>
        </div>

        <script>
        // Load Hospitals
        fetch("http://localhost:5000/hospitals")
            .then(res => res.json())
            .then(data => {
                const hospitalSelect = document.getElementById("hospital");
                data.forEach(h => {
                    const option = document.createElement("option");
                    option.value = h.hospital_id;
                    option.textContent = h.hospital_name;
                    hospitalSelect.appendChild(option);
                });
            });

        // Load Doctors when hospital changes
        document.getElementById("hospital").addEventListener("change", function() {
            const hospitalId = this.value;
            if(!hospitalId) return;

            fetch(`http://localhost:5000/doctors/${hospitalId}`)
                .then(res => res.json())
                .then(data => {
                    const doctorSelect = document.getElementById("doctor");
                    doctorSelect.innerHTML = "<option value=''>Select Specialist</option>";
                    data.forEach(d => {
                        const option = document.createElement("option");
                        option.value = d.doctor_id;
                        option.textContent = d.name + " (" + d.specialization + ")";
                        doctorSelect.appendChild(option);
                    });
                });
        });

        // Submit form
        document.getElementById("appointmentForm").addEventListener("submit", function(e){
            e.preventDefault();

            const name = document.getElementById("patient_name").value.trim();
            const phone = document.getElementById("patient_phone").value.trim();
            const email = document.getElementById("patient_email").value.trim();
            const hospitalId = document.getElementById("hospital").value;
            const doctorId = document.getElementById("doctor").value;
            const date = document.getElementById("appointment_date").value;
            const timeSlot = document.getElementById("time_slot").value;
            const reason = document.getElementById("reason").value.trim();

            if(!name || !phone || !hospitalId || !doctorId || !date || !timeSlot){
                alert("❌ Please fill all required fields!");
                return;
            }

            const startTime = timeSlot.split(" - ")[0];
            const [hour, minute, period] = startTime.match(/(\d+):(\d+) (\w+)/).slice(1);
            let hour24 = parseInt(hour);
            if(period === "PM" && hour24 !== 12) hour24 += 12;
            if(period === "AM" && hour24 === 12) hour24 = 0;
            const time_mysql = `${hour24.toString().padStart(2,'0')}:${minute}:00`;

            // Insert patient
            fetch("http://localhost:5000/patients", {
                method: "POST",
                headers: {"Content-Type":"application/json"},
                body: JSON.stringify({ full_name: name, contact_number: phone, email: email })
            })
            .then(res => res.json())
            .then(data => {
                const patientId = data.patient_id;

                // Insert appointment
                fetch("http://localhost:5000/appointments", {
                    method: "POST",
                    headers: {"Content-Type":"application/json"},
                    body: JSON.stringify({
                        patient_id: patientId,
                        hospital_id: hospitalId,
                        doctor_id: doctorId,
                        appointment_date: date,
                        appointment_time: time_mysql,
                        status: "Pending",
                        reason: reason
                    })
                })
                .then(res => res.json())
                .then(resData => {
                    if(resData.success){
                        const message = `Hello ${name}, your appointment is booked for ${date} at ${startTime}.`;
                        window.open(`https://wa.me/91${phone}?text=${encodeURIComponent(message)}`, "_blank");
                        document.getElementById("successPopup").style.display = "flex";
                        document.getElementById("appointmentForm").reset();
                    } else alert("❌ Error booking appointment!");
                });
            })
            .catch(err => console.error(err));
        });

        function closePopup(){
            document.getElementById("successPopup").style.display = "none";
        }
        </script>

    </div>

    <div class="appointment-image-section">
        <img src="images/appoint.png" alt="Appointment Image">
    </div>

</div>
</div>
</body>
</html>
